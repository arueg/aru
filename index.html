<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Аружан, прости меня ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #ff4d94, #ff7eb3);
  font-family: Arial, sans-serif;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* заголовок */
h1 {
  color: white;
  font-size: 42px;
  margin-bottom: 30px;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
}

/* кнопки */
.buttons {
  display: flex;
  gap: 20px;
}

button {
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

#yes {
  background: #4CAF50;
  color: white;
}

#no {
  background: #ff4d4d;
  color: white;
}

button:hover {
  transform: scale(1.1);
}

/* финал */
.final {
  text-align: center;
}

.final h1 {
  font-size: 48px;
}

.cat-box {
  background: #ff5fa2;
  padding: 20px;
  border-radius: 20px;
  display: inline-block;
}

.cat-box img {
  width: 250px;
  border-radius: 15px;
}
</style>
</head>

<body>

<h1>Аружан, прости меня ❤️</h1>

<div class="buttons">
  <button id="no">😈 Не прощаю</button>
  <button id="yes">💖 Прощаю</button>
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");

// функция перемещения
function moveButton() {
  noBtn.style.position = "absolute";
  noBtn.style.zIndex = "1000";

  const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
  const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

// 💻 ПК — от курсора
document.addEventListener("mousemove", (e) => {
  const rect = noBtn.getBoundingClientRect();

  const distance = Math.hypot(
    e.clientX - (rect.left + rect.width / 2),
    e.clientY - (rect.top + rect.height / 2)
  );

  if (distance < 120) moveButton();
});

// 📱 телефон — реагирует на движение пальца
document.addEventListener("touchmove", (e) => {
  const touch = e.touches[0];
  const rect = noBtn.getBoundingClientRect();

  const distance = Math.hypot(
    touch.clientX - (rect.left + rect.width / 2),
    touch.clientY - (rect.top + rect.height / 2)
  );

  if (distance < 120) moveButton();
});

// 📱 защита от клика
noBtn.addEventListener("touchstart", (e) => {
  e.preventDefault();
  moveButton();
});

// 💻 защита от клика
noBtn.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  moveButton();
});

// финал
yesBtn.onclick = () => {
  document.body.innerHTML = `
    <div class="final">
      <h1>Ура! Ты лучшая! 🥰</h1>
      <div class="cat-box">
        <img src="https://media.tenor.com/6C9lCzqGdFMAAAAC/cute-mocha.gif">
      </div>
    </div>
  `;
};
</script>

</body>
</html>
